  # -- Automount service account token for the server service account
  automountServiceAccountToken: true


## Telemetry parameters
##
## Collector component: https://hub.docker.com/r/otel/opentelemetry-collector-contrib
otel:
  # -- Enable otel export
  enabled: false
  # -- The hostname and port for an otel compatible backend
  endpoint: "http://localhost:4318"
  # -- The
  interval: 60000
  # -- The timeout for data transfer
  timeout: 10

  collector:
    # -- Deploy an otel collector backend as sidecar
    enabled: false
    ## OpenTelemetry Collector image version
    ## ref: https://hub.docker.com/r/otel/opentelemetry-collector-contrib
    ##
    image:
      # -- OpenTelemetry Collector image registry
      registry: docker.io
      # -- OpenTelemetry Collector image repository
      repository: otel/opentelemetry-collector-contrib
      # -- Overrides the OpenTelemetry Collector image tag
      tag: "0.95.0"
      ## Specify a imagePullPolicy
      ## Defaults to 'Always' if image tag is 'latest', else set to 'IfNotPresent'
      ## ref: https://kubernetes.io/docs/user-guide/images/#pre-pulling-images
      ##
      # -- stac-fastapi-eodag image pull policy
      pullPolicy: IfNotPresent
    ports:
      # -- port to receive otel telemetry
      otlpReceiver: 4318
      # -- Port for Prometheus scrapping. Data available under /metrics
      prometheusExporter: 8000
    # -- [object] Optional overwrite of OpenTelemetry Collector default configuration
    config: |-
      extensions:
        health_check:
        pprof:
          endpoint: 0.0.0.0:1777
        zpages:
          endpoint: 0.0.0.0:55679
      receivers:
        otlp:
          protocols:
            http:
              endpoint: 0.0.0.0:4318
        # Collect own metrics
        prometheus:
          config:
            scrape_configs:
            - job_name: 'otel-collector'
              scrape_interval: 10s
              static_configs:
              - targets: ['0.0.0.0:8888']
      processors:
        batch:
      exporters:
        debug:
          verbosity: detailed
        # Data sources: metrics
        prometheus:
          endpoint: 0.0.0.0:8000
          namespace: eodag-otelcol-exporter
      service:
        pipelines:
          traces:
            receivers: [otlp]
            processors: [batch]
            exporters: [debug]
          metrics:
            receivers: [otlp]
            processors: [batch]
            exporters: [debug,prometheus]
        extensions: [health_check, pprof, zpages]

  serviceMonitor:
    ##
    # -- if `true`, creates a Prometheus Operator PodMonitor
    enabled: false
    ##
    # -- Namespace for the PodMonitor Resource (defaults to the Release Namespace)
    namespace: ""
    ## ref: https://github.com/coreos/prometheus-operator/blob/master/Documentation/api.md#endpoint
    ## e.g:
    ## interval: 10s
    ##
    # -- Interval at which metrics should be scraped.
    interval: ""
    ## ref: https://github.com/coreos/prometheus-operator/blob/master/Documentation/api.md#endpoint
    ## e.g:
    ## scrapeTimeout: 10s
    ##
    # -- Timeout after which the scrape is ended
    scrapeTimeout: ""
    ##
    # -- Labels that can be used so PodMonitor will be discovered by Prometheus
    labels: {}
    ##
    # -- RelabelConfigs to apply to samples before scraping
    relabelings: []
    ##
    # -- MetricRelabelConfigs to apply to samples before ingestion
    metricRelabelings: []
