## stac-fastapi-eodag configuration

##
api:
  # -- API title
  title: EODAG STAC FastAPI
  # -- API description
  description: STAC API powered by EODAG and STAC FastAPI
  # -- ID of the landing page
  landingId: eodag-stac-fastapi

##
# -- Application root path
rootPath: ""

##
# -- When set to true, set the EODAG logging level to 3 (DEBUG). Otherwise, set EODAG logging level to 2 (INFO).
debug: false

##
# -- Keep the original URL in the response headers
keepOriginUrl: false


## stac-fastapi-eodag common parameters

## CS Group stac-fastapi-eodag image version
## ref: https://hub.docker.com/r/csspace/eodag-server
## Number of replicas to deploy
##
image:
  # -- stac-fastapi-eodag image registry
  registry: ghcr.io
  # -- stac-fastapi-eodag image repository
  repository: cs-si/stac-fastapi-eodag
  # -- Overrides the stac-fastapi-eodag image tag whose default is the chart appVersion (immutable tags are recommended)
  tag: "v0.4.0-eodag-4.5.0"
  # -- stac-fastapi-eodag image digest in the way sha256:aa.... Please note this parameter, if set, will override the tag
  digest: ""
  ## Specify a imagePullPolicy
  ## Defaults to 'Always' if image tag is 'latest', else set to 'IfNotPresent'
  ## ref: https://kubernetes.io/docs/user-guide/images/#pre-pulling-images
  ##
  # -- stac-fastapi-eodag image pull policy
  pullPolicy: IfNotPresent
  ## Optionally specify an array of imagePullSecrets.
  ## Secrets must be manually created in the namespace.
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
  ## Example:
  ## pullSecrets:
  ##   - myRegistryKeySecretName
  ##
  # -- Specify docker-registry secret names as an array
  pullSecrets: []

##
# -- Number of stac-fastapi-eodag replicas
replicaCount: 1

## Configure extra options for stac-fastapi-eodag containers' liveness and readiness probes
## ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-probes/#configure-probes
##
startupProbe:
  # -- Enable startupProbe on stac-fastapi-eodag containers
  enabled: false
  # -- Initial delay seconds for startupProbe
  initialDelaySeconds: 10
  # -- Period seconds for startupProbe
  periodSeconds: 10
  # -- Timeout seconds for startupProbe
  timeoutSeconds: 1
  # -- Failure threshold for startupProbe
  failureThreshold: 3
  # -- Success threshold for startupProbe
  successThreshold: 1
##
livenessProbe:
  # -- Enable livenessProbe on stac-fastapi-eodag containers
  enabled: false
  # -- Initial delay seconds for livenessProbe
  initialDelaySeconds: 3
  # -- Period seconds for livenessProbe
  periodSeconds: 10
  # -- Timeout seconds for livenessProbe
  timeoutSeconds: 1
  # -- Failure threshold for livenessProbe
  failureThreshold: 3
  # -- Success threshold for livenessProbe
  successThreshold: 1
##
readinessProbe:
  # -- Enable readinessProbe on stac-fastapi-eodag containers
  enabled: false
  # -- Initial delay seconds for readinessProbe
  initialDelaySeconds: 3
  # -- Period seconds for readinessProbe
  periodSeconds: 10
  # -- Timeout seconds for readinessProbe
  timeoutSeconds: 1
  # -- Failure threshold for readinessProbe
  failureThreshold: 3
  # -- Success threshold for readinessProbe
  successThreshold: 1

##
# -- Custom livenessProbe that overrides the default one
customLivenessProbe: {}

##
# -- Custom readinessProbe that overrides the default one
customReadinessProbe: {}

## stac-fastapi-eodag resource requests and limits
## ref: https://kubernetes.io/docs/user-guide/compute-resources/
##
resources:
  # -- The resources limits for the stac-fastapi-eodag containers
  limits: {}
  # -- The requested resources for the stac-fastapi-eodag containers
  requests: {}

## STAC FastAPI EODAG horizontal autoscaling
## ref: https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/
##
horizontalPodAutoscaler:
  # -- Decide to enable or disable the horizontal pod autoscaler
  enabled: false
  # -- The maximum number of replicas that are allowed to run simultaneously
  maxReplicas: 10
  # -- The maximum CPU utilization target computed in % of the CPU resources request.
  cpuUtilization: 50
  # -- The maximum RAM utilization target computed in % of the RAM resources request.
  memUtilization: 50

## Configure Pods Security Context
## ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-pod
##
podSecurityContext:
  # -- Enabled stac-fastapi-eodag pods' Security Context
  enabled: false
  # -- Set stac-fastapi-eodag pod's Security Context fsGroup
  fsGroup: 1001

## Configure Container Security Context
## ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-pod
##
containerSecurityContext:
  # -- Enabled stac-fastapi-eodag containers' Security Context
  enabled: false
  # -- Set stac-fastapi-eodag containers' Security Context runAsUser
  runAsUser: 1001
  # -- Set stac-fastapi-eodag containers' Security Context allowPrivilegeEscalation
  allowPrivilegeEscalation: false
  capabilities:
    # -- Set stac-fastapi-eodag containers' Security Context capabilities to be dropped
    drop:
      - all
  # -- Set stac-fastapi-eodag containers' Security Context readOnlyRootFilesystem
  readOnlyRootFilesystem: false
  # -- Set stac-fastapi-eodag container's Security Context runAsNonRoot
  runAsNonRoot: true

##
# -- Override default container command (useful when using custom images)
command: []

##
# -- Override default container args (useful when using custom images). Overrides the defaultArgs.
args: []

## stac-fastapi-eodag application ports
containerPorts:
  # -- stac-fastapi-eodag application HTTP port number
  http: 8080

