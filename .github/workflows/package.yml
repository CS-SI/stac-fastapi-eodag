name: Build and publish a container image

on:
  push:
    tags: ['v*']
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Determine the container tag and labels
        id: container_tag
        run: |
          APP_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV

          # Default: branch/tag name
          CONTAINER_TAG=${GITHUB_REF##*/}

          # Tag pushes are release images, main is the floating development image.
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
              EODAG_VERSION=$(grep -A1 '^name = "eodag"$' uv.lock | grep version | sed 's/version = "\(.*\)"/\1/')
              echo "EODAG_VERSION=$EODAG_VERSION" >> $GITHUB_ENV
              CONTAINER_TAG="${APP_VERSION}-eodag-${EODAG_VERSION}"
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
              CONTAINER_TAG="main"
          fi

          echo "CONTAINER_TAG=$CONTAINER_TAG" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract container metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.CONTAINER_TAG }}
          labels: |
            org.opencontainers.image.title=stac-fastapi-eodag
            org.opencontainers.image.description=A STAC FastAPI backend using EODAG
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}.git
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.authors=CS GROUP - France (CSSI) <eodag@csgroup.space>
            org.opencontainers.image.version=${{ env.APP_VERSION }}
            org.opencontainers.image.eodag.version=${{ env.EODAG_VERSION }}

      - name: Build and push container image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
